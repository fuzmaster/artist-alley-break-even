<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f0a1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e879f9"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Fuchsia glow blob -->
  <ellipse cx="900" cy="200" rx="320" ry="220" fill="#d946ef" fill-opacity="0.06"/>
  <ellipse cx="200" cy="480" rx="200" ry="150" fill="#a855f7" fill-opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="80" y="80" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Main heading -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">Artist Alley</text>
  <text x="80" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">Break-Even Calculator</text>

  <!-- Subline -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8">Know your numbers before you table.</text>

  <!-- Stat pills -->
  <g>
    <!-- Pill 1 -->
    <rect x="80" y="390" width="220" height="64" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="100" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.1em">BREAK-EVEN UNITS</text>
    <text x="100" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#e879f9">47 items</text>

    <!-- Pill 2 -->
    <rect x="318" y="390" width="220" height="64" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="338" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.1em">SALES PER HOUR</text>
    <text x="338" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#34d399">1.9 / hr</text>

    <!-- Pill 3 -->
    <rect x="556" y="390" width="220" height="64" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="576" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.1em">UPFRONT CASH</text>
    <text x="576" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">$1,830</text>
  </g>

  <!-- Risk badge -->
  <rect x="80" y="490" width="130" height="32" rx="8" fill="#14532d" stroke="#16a34a" stroke-width="1"/>
  <text x="145" y="511" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="0.05em">LOW RISK</text>

  <!-- Right side — decorative result card -->
  <rect x="820" y="80" width="300" height="470" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="820" y="80" width="300" height="4" rx="2" fill="url(#accent)"/>
  <text x="970" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="0.1em">RESULT</text>
  <text x="970" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle">47</text>
  <text x="970" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">items to break even</text>
  <line x1="860" y1="280" x2="1080" y2="280" stroke="#1e293b" stroke-width="1"/>
  <text x="860" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.08em">SALES / DAY</text>
  <text x="1080" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="end">15.7</text>
  <text x="860" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.08em">SALES / HOUR</text>
  <text x="1080" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#34d399" text-anchor="end">1.9</text>
  <text x="860" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.08em">PROFIT / HOUR</text>
  <text x="1080" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="end">$15.20</text>
  <text x="860" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.08em">UPFRONT CASH</text>
  <text x="1080" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="end">$1,830</text>
  <rect x="860" y="468" width="220" height="36" rx="8" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="970" y="491" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="0.05em">LOW RISK</text>

  <!-- Footer credit -->
  <text x="80" y="590" font-family="ui-monospace, monospace" font-size="13" fill="#475569">jacobbritten.com</text>
</svg>
